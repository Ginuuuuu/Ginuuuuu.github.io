<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reshin Ginu R S — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #00f5c4;
      --accent2: #7b61ff;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 4rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(12px);
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--accent); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 8rem 4rem 4rem;
      position: relative;
      overflow: hidden;
      max-width: 1400px;
      margin: 0 auto;
    }

    .hero-grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridShift {
      0% { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    .hero-glow {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,245,196,0.07) 0%, transparent 70%);
      top: -100px; right: -100px;
      pointer-events: none;
    }

    .hero-glow2 {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123,97,255,0.06) 0%, transparent 70%);
      bottom: 50px; left: 100px;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      animation: fadeUp 0.9s ease both;
    }

    .hero-tag {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .hero-tag::before {
      content: '';
      display: inline-block;
      width: 24px; height: 1px;
      background: var(--accent);
    }

    h1 {
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
    }

    h1 .name-line {
      display: block;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-bio {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 2.5rem;
    }

    .hero-bio strong {
      color: var(--text);
      font-weight: 600;
    }

    .hero-cta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.85rem 1.8rem;
      border-radius: 3px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0a0f;
      font-weight: 700;
    }

    .btn-primary:hover {
      background: #00ddb0;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,245,196,0.25);
    }

    .btn-outline {
      border: 1px solid var(--border);
      color: var(--text);
      background: transparent;
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    /* ── HERO RIGHT: TERMINAL CARD ── */
    .hero-visual {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    .terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,245,196,0.05);
    }

    .terminal-bar {
      background: #16161f;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .terminal-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .terminal-dot:nth-child(1) { background: #ff5f56; }
    .terminal-dot:nth-child(2) { background: #ffbd2e; }
    .terminal-dot:nth-child(3) { background: #27c93f; }

    .terminal-title {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: 0.5rem;
    }

    .terminal-body {
      padding: 1.5rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      line-height: 2;
    }

    .t-prompt { color: var(--accent); }
    .t-cmd { color: var(--text); }
    .t-key { color: #7b61ff; }
    .t-val { color: #f0c060; }
    .t-str { color: #80d8a8; }
    .t-comment { color: var(--muted); }

    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent);
      animation: blink 1s steps(1) infinite;
      vertical-align: middle;
      margin-left: 2px;
    }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* ── SECTION COMMON ── */
    section {
      padding: 6rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 3rem;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 4rem;
      max-width: 1300px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── SKILLS LEGEND ── */
    .skills-legend {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    .done-dot     { background: var(--accent); }
    .learning-dot { background: #f0c060; }

    .skills-group-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── SKILL CARD STATES ── */
    .skill-done {
      border-color: rgba(0,245,196,0.3) !important;
      background: rgba(0,245,196,0.04) !important;
      position: relative;
    }

    .skill-building {
      border-color: rgba(240,192,96,0.25) !important;
      background: rgba(240,192,96,0.03) !important;
      position: relative;
    }

    .skill-planned {
      border-color: rgba(255,255,255,0.06) !important;
      opacity: 0.7;
      position: relative;
    }

    .skill-done-badge,
    .skill-building-badge,
    .skill-planned-badge {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 0.6rem;
    }

    .skill-done-badge {
      background: rgba(0,245,196,0.12);
      color: var(--accent);
      border: 1px solid rgba(0,245,196,0.3);
    }

    .skill-building-badge {
      background: rgba(240,192,96,0.1);
      color: #f0c060;
      border: 1px solid rgba(240,192,96,0.3);
    }

    .skill-planned-badge {
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── MOTIVATION CODE BLOCK ── */
    .motivation-block {
      margin-top: 3.5rem;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,245,196,0.04);
    }

    .motivation-bar {
      background: #16161f;
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      border-bottom: 1px solid var(--border);
    }

    .motivation-title {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      margin-left: 0.4rem;
    }

    .motivation-code {
      font-family: var(--mono);
      font-size: 0.82rem;
      line-height: 1.9;
      padding: 1.6rem 2rem;
      margin: 0;
      white-space: pre;
      overflow-x: auto;
      color: var(--text);
    }

    .mc-keyword { color: #7b61ff; }
    .mc-fn      { color: var(--accent); }
    .mc-prop    { color: #f0c060; }
    .mc-comment { color: #4a4a6a; font-style: italic; }
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .skill-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.6s ease both;
    }

    .skill-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .skill-category {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--accent2);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .skill-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .skill-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1rem;
    }

    .tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.25rem 0.6rem;
      letter-spacing: 0.05em;
    }

    /* ── ABOUT ── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    .about-text p {
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .about-text p strong { color: var(--text); }

    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      font-family: var(--mono);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.3rem;
      font-family: var(--mono);
      letter-spacing: 0.05em;
    }

    /* ── GOALS & VISION ── */
    .vision-intro {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.8;
      max-width: 580px;
      margin-bottom: 3.5rem;
    }

    .journey {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      max-width: 720px;
    }

    /* Stage row */
    .stage {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 1.5rem;
      width: 100%;
    }

    .stage-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stage-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border: 2px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      z-index: 1;
    }

    .current-icon {
      border-color: var(--accent);
      background: rgba(0,245,196,0.08);
      box-shadow: 0 0 16px rgba(0,245,196,0.2);
    }

    .goal-icon-1 { border-color: #f0c060; background: rgba(240,192,96,0.06); }
    .goal-icon-2 { border-color: #5b8def; background: rgba(91,141,239,0.06); }

    .final-icon {
      font-size: 1.4rem;
      border-color: var(--accent2);
      background: rgba(123,97,255,0.12);
      box-shadow: 0 0 20px rgba(123,97,255,0.3);
      color: var(--accent2);
    }

    .stage-line {
      width: 2px;
      flex: 1;
      min-height: 24px;
      background: linear-gradient(to bottom, var(--border), transparent);
      margin-top: 4px;
    }

    /* Stage card */
    .stage-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 0;
      transition: transform 0.2s, border-color 0.2s;
    }

    .stage-card:hover { transform: translateX(4px); border-color: rgba(255,255,255,0.1); }

    .current-card { border-color: rgba(0,245,196,0.25); background: rgba(0,245,196,0.03); }
    .goal-card-1  { border-color: rgba(240,192,96,0.2); }
    .goal-card-2  { border-color: rgba(91,141,239,0.15); }
    .final-card   {
      border-color: rgba(123,97,255,0.4);
      background: rgba(123,97,255,0.05);
      box-shadow: 0 0 40px rgba(123,97,255,0.08);
    }

    .stage-status {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .current-status { color: var(--accent); }
    .goal-status-1  { color: #f0c060; }
    .goal-status-2  { color: #5b8def; }
    .final-status   { color: var(--accent2); }

    .stage-role {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 0.6rem;
      letter-spacing: -0.01em;
    }

    .final-role {
      font-size: 1.5rem;
      background: linear-gradient(135deg, #fff 30%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stage-focus {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 0.9rem;
    }

    .stage-goal-line {
      font-family: var(--mono);
      font-size: 0.7rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: baseline;
      margin-bottom: 0.6rem;
    }

    .goal-label { color: var(--muted); }
    .goal-value { color: var(--text); }

    .stage-why {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
      border-left: 2px solid var(--border);
      padding-left: 0.8rem;
      margin-top: 0.5rem;
    }

    .final-quote {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--accent2);
      font-style: italic;
      opacity: 0.85;
      border-left: 2px solid var(--accent2);
      padding-left: 0.8rem;
    }

    /* Arrow between stages */
    .journey-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.4rem 0;
      width: 56px;
      gap: 0.2rem;
    }

    .arrow-line {
      width: 2px;
      height: 18px;
      background: linear-gradient(to bottom, var(--border), var(--accent2));
      opacity: 0.4;
    }

    .arrow-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.05em;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      max-height: 120px;
      opacity: 0.6;
      display: none;
    }

    .arrow-head {
      font-size: 1rem;
      color: var(--muted);
      opacity: 0.5;
      line-height: 1;
    }

    /* ── CONTACT ── */
    .contact-section {
      text-align: center;
      padding: 6rem 4rem;
      position: relative;
    }

    .contact-glow {
      position: absolute;
      width: 500px; height: 300px;
      background: radial-gradient(ellipse, rgba(0,245,196,0.05) 0%, transparent 70%);
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .contact-section .section-title { margin-bottom: 1rem; }

    .contact-sub {
      color: var(--muted);
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    .contact-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 3rem;
    }

    .contact-link {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.8rem 1.4rem;
      transition: all 0.2s;
    }

    .contact-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    .contact-link svg {
      width: 16px; height: 16px;
      fill: currentColor;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-text {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .footer-accent { color: var(--accent); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SCROLL ANIMATE ── */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Fallback: if JS doesn't run, still show content */
    .no-js .reveal {
      opacity: 1;
      transform: none;
    }

    /* ── DESKTOP ENHANCEMENTS ── */
    @media (min-width: 1024px) {
      n
